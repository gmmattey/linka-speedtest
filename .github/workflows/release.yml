# Release â€” linka SpeedTest PWA + APK Capacitor
#
# Dispara em push de tag `v*` (ex.: `v1.2.0`). Dois jobs paralelos:
#   - `pwa`: build do PWA + deploy em Cloudflare Pages (projeto `linkaSpeedtestPwa`).
#   - `apk`: build do APK Android assinado (Capacitor) + upload no GitHub Release.
#
# PrÃ©-requisitos do repositÃ³rio (configurar UMA vez em Settings â†’ Secrets and
# variables â†’ Actions). Detalhes em `docs/CI-CD.md`:
#
#   Cloudflare Pages
#     - CLOUDFLARE_API_TOKEN     â† token "Account â†’ Cloudflare Pages: Edit"
#     - CLOUDFLARE_ACCOUNT_ID    â† copiar do dashboard
#     - CLOUDFLARE_PAGES_PROJECT â† nome do projeto Pages (default: linkaSpeedtestPwa)
#
#   Android signing (release keystore)
#     - KEYSTORE_BASE64          â† `base64 -w0 release.jks > out.txt`
#     - KEYSTORE_PASSWORD
#     - KEY_ALIAS
#     - KEY_PASSWORD
#
# Versionamento: SemVer via tag (`vMAJOR.MINOR.PATCH`). O `package.json` deve
# bater â€” quem cria a tag se responsabiliza por manter os dois sincronizados.
# Para versÃµes pre-release (`v1.2.0-rc.1`), o GitHub Release Ã© marcado como
# "prerelease" automaticamente.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # criar GitHub Release e anexar APK

jobs:
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Job 1: PWA â€” build + deploy em Cloudflare Pages
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  pwa:
    name: PWA build + Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        run: npm run build

      # â”€â”€ Deploy em Cloudflare Pages â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Action oficial wrangler-action@v3 â€” usa `npx wrangler pages deploy`.
      # O projeto Pages precisa existir antes (criado manualmente uma vez).
      # Se o usuÃ¡rio usar OUTRO target (Vercel, Netlify, S3), substitua
      # esta etapa â€” o `dist/` estÃ¡ pronto apÃ³s `npm run build`.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT || 'linkaSpeedtestPwa' }} --branch=main

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Job 2: APK Android â€” build assinado + upload no Release
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  apk:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build PWA (webDir)
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      # â”€â”€ Decode keystore do secret â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # `KEYSTORE_BASE64` foi gerado localmente com:
      #   base64 -w0 release.jks > out.txt
      # Aqui decodificamos para um arquivo `.jks` no runner. Em seguida o
      # gradle.properties (gerado on-the-fly) aponta para esse caminho.
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      # â”€â”€ Configurar gradle.properties â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # O `android/app/build.gradle` deve ler `RELEASE_KEYSTORE_PATH`,
      # `RELEASE_KEYSTORE_PASSWORD`, `RELEASE_KEY_ALIAS`, `RELEASE_KEY_PASSWORD`
      # do `gradle.properties` para o signingConfig de release. Ver
      # `docs/CI-CD.md` para o snippet de signingConfigs a aplicar uma vez.
      - name: Write gradle signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            echo "RELEASE_KEYSTORE_PATH=$RELEASE_KEYSTORE_PATH"
            echo "RELEASE_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # â”€â”€ Localizar APK gerado â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # O nome varia entre `app-release.apk` e `app-release-unsigned.apk`
      # se signingConfig falhar. O comando abaixo busca o `release` legÃ­timo.
      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name 'app-release*.apk' | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "APK nÃ£o encontrado â€” verifique signing config" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DEST="builds/apk/linkaSpeedtestPwa-${VERSION}-release.apk"
          mkdir -p builds/apk
          cp "$APK_PATH" "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ steps.locate.outputs.version }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30

      # â”€â”€ Anexar APK ao GitHub Release â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # `softprops/action-gh-release` cria o release se nÃ£o existir e
      # anexa o APK ao mesmo. `prerelease` Ã© detectado automaticamente
      # se a tag contÃ©m um hÃ­fen (ex.: `v1.2.0-rc.1`).
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: linka SpeedTest ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.locate.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

