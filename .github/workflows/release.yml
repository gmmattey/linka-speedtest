# Release — linka SpeedTest PWA + APK Capacitor
#
# Dispara em push de tag `v*` (ex.: `v1.2.0`). Dois jobs paralelos:
#   - `pwa`: build do PWA + deploy em Cloudflare Pages (projeto `linka-speedtest`).
#   - `apk`: build do APK Android assinado (Capacitor) + upload no GitHub Release.
#
# Pré-requisitos do repositório (configurar UMA vez em Settings → Secrets and
# variables → Actions). Detalhes em `docs/CI-CD.md`:
#
#   Cloudflare Pages
#     - CLOUDFLARE_API_TOKEN     ← token "Account → Cloudflare Pages: Edit"
#     - CLOUDFLARE_ACCOUNT_ID    ← copiar do dashboard
#     - CLOUDFLARE_PAGES_PROJECT ← nome do projeto Pages (default: linka-speedtest)
#
#   Android signing (release keystore)
#     - KEYSTORE_BASE64          ← `base64 -w0 release.jks > out.txt`
#     - KEYSTORE_PASSWORD
#     - KEY_ALIAS
#     - KEY_PASSWORD
#
# Versionamento: SemVer via tag (`vMAJOR.MINOR.PATCH`). O `package.json` deve
# bater — quem cria a tag se responsabiliza por manter os dois sincronizados.
# Para versões pre-release (`v1.2.0-rc.1`), o GitHub Release é marcado como
# "prerelease" automaticamente.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # criar GitHub Release e anexar APK

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Job 1: PWA — build + deploy em Cloudflare Pages
  # ───────────────────────────────────────────────────────────────────────
  pwa:
    name: PWA build + Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        run: npm run build

      # ── Deploy em Cloudflare Pages ─────────────────────────────────────
      # Action oficial wrangler-action@v3 — usa `npx wrangler pages deploy`.
      # O projeto Pages precisa existir antes (criado manualmente uma vez).
      # Se o usuário usar OUTRO target (Vercel, Netlify, S3), substitua
      # esta etapa — o `dist/` está pronto após `npm run build`.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT || 'linka-speedtest' }} --branch=main

  # ───────────────────────────────────────────────────────────────────────
  # Job 2: APK Android — build assinado + upload no Release
  # ───────────────────────────────────────────────────────────────────────
  apk:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build PWA (webDir)
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      # ── Decode keystore do secret ─────────────────────────────────────
      # `KEYSTORE_BASE64` foi gerado localmente com:
      #   base64 -w0 release.jks > out.txt
      # Aqui decodificamos para um arquivo `.jks` no runner. Em seguida o
      # gradle.properties (gerado on-the-fly) aponta para esse caminho.
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      # ── Configurar gradle.properties ──────────────────────────────────
      # O `android/app/build.gradle` deve ler `RELEASE_KEYSTORE_PATH`,
      # `RELEASE_KEYSTORE_PASSWORD`, `RELEASE_KEY_ALIAS`, `RELEASE_KEY_PASSWORD`
      # do `gradle.properties` para o signingConfig de release. Ver
      # `docs/CI-CD.md` para o snippet de signingConfigs a aplicar uma vez.
      - name: Write gradle signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            echo "RELEASE_KEYSTORE_PATH=$RELEASE_KEYSTORE_PATH"
            echo "RELEASE_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ── Localizar APK gerado ─────────────────────────────────────────
      # O nome varia entre `app-release.apk` e `app-release-unsigned.apk`
      # se signingConfig falhar. O comando abaixo busca o `release` legítimo.
      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name 'app-release*.apk' | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "APK não encontrado — verifique signing config" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DEST="builds/apk/linka-speedtest-${VERSION}-release.apk"
          mkdir -p builds/apk
          cp "$APK_PATH" "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ steps.locate.outputs.version }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30

      # ── Anexar APK ao GitHub Release ─────────────────────────────────
      # `softprops/action-gh-release` cria o release se não existir e
      # anexa o APK ao mesmo. `prerelease` é detectado automaticamente
      # se a tag contém um hífen (ex.: `v1.2.0-rc.1`).
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: linka SpeedTest ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.locate.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
